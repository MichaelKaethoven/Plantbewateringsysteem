; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Gedeelde bibliotheken voor alle mock-omgevingen
[mock_base]
lib_deps =
	joaolopesf/SerialDebug@^0.9.82
	bblanchon/ArduinoTrace@^1.2.0

; Echte omgeving: wordt gebruikt om naar het fysieke bord te uploaden
[env:dfrobot_firebeetle2_esp32e]
platform = espressif32
board = dfrobot_firebeetle2_esp32e
framework = arduino
lib_deps =
	joaolopesf/SerialDebug@^0.9.82

; ── capacitief DRY ────────────────────────────────────────────────────────────
[env:mock_cap_dry_res_dry_low]
platform = espressif32
board = dfrobot_firebeetle2_esp32e
framework = arduino
lib_deps = ${mock_base.lib_deps}
build_flags = -D MOCK_SENSORS -D MOCK_CAPACITIVE_DRY -D MOCK_RESISTIVE_DRY -D MOCK_TEMP_LOW

