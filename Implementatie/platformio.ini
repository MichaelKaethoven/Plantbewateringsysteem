; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Gedeelde bibliotheken voor alle mock-omgevingen
[mock_base]
lib_deps =
	joaolopesf/SerialDebug@^0.9.82
	bblanchon/ArduinoTrace@^1.2.0

; Echte omgeving: wordt gebruikt om naar het fysieke bord te uploaden
[env:dfrobot_firebeetle2_esp32e]
platform = espressif32
board = dfrobot_firebeetle2_esp32e
framework = arduino
lib_deps =
	joaolopesf/SerialDebug@^0.9.82

; Mock: droge grond, hoge temperatuur (>25°C) -> pomp aan voor volle duur
[env:mock_dry_high]
platform = espressif32
board = dfrobot_firebeetle2_esp32e
framework = arduino
lib_deps = ${mock_base.lib_deps}
build_flags = -D MOCK_SENSORS -D MOCK_DRY -D MOCK_TEMP_HIGH

; Mock: droge grond, lage temperatuur (<5°C) -> pomp blijft uit (te koud)
[env:mock_dry_low]
platform = espressif32
board = dfrobot_firebeetle2_esp32e
framework = arduino
lib_deps = ${mock_base.lib_deps}
build_flags = -D MOCK_SENSORS -D MOCK_DRY -D MOCK_TEMP_LOW

; Mock: natte grond, hoge temperatuur (>25°C) -> pomp blijft uit (al nat)
[env:mock_wet_high]
platform = espressif32
board = dfrobot_firebeetle2_esp32e
framework = arduino
lib_deps = ${mock_base.lib_deps}
build_flags = -D MOCK_SENSORS -D MOCK_WET -D MOCK_TEMP_HIGH

; Mock: natte grond, lage temperatuur (<5°C) -> pomp blijft uit (al nat en te koud)
[env:mock_wet_low]
platform = espressif32
board = dfrobot_firebeetle2_esp32e
framework = arduino
lib_deps = ${mock_base.lib_deps}
build_flags = -D MOCK_SENSORS -D MOCK_WET -D MOCK_TEMP_LOW

; Mock: droge grond, normale temperatuur (5-25°C) -> pomp aan voor korte duur
[env:mock_dry_normal]
platform = espressif32
board = dfrobot_firebeetle2_esp32e
framework = arduino
lib_deps = ${mock_base.lib_deps}
build_flags = -D MOCK_SENSORS -D MOCK_DRY -D MOCK_TEMP_NORMAL

; Mock: natte grond, normale temperatuur (5-25°C) -> pomp blijft uit (al nat)
[env:mock_wet_normal]
platform = espressif32
board = dfrobot_firebeetle2_esp32e
framework = arduino
lib_deps = ${mock_base.lib_deps}
build_flags = -D MOCK_SENSORS -D MOCK_WET -D MOCK_TEMP_NORMAL
